<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Pane">
  <!--
    Pane mark: solid square with bottom-right cutout.
    Uses currentColor so it adapts to light/dark UI text color.
    Cutout: 24×24, inset 10 from right and bottom edges.
  -->
  <path
    fill="currentColor"
    fill-rule="evenodd"
    clip-rule="evenodd"
    d="M0 0h100v100H0V0zm66 66h24v24H66V66z"
  />
</svg>
